name: Auto Deploy via npm run deploy

on:
  push:
    branches: ["main"]   # 🔒 ONLY main
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write   # required for gh-pages push
  pages: write
  id-token: write   # required for gh-pages push

jobs:
  # CI job (example for testing, linting, etc.)
  ci:
    name: CI Workflow
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Add other steps like tests, linting, etc.
      - name: Run tests
        run: npm test -- --ci --coverage

  # Deploy job, depends on CI success
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [ci]  # Ensure deploy runs after ci job passes
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper git info

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy
        run: npm run deploy
        env:
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
