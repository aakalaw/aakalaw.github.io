name: Auto Deploy via npm run deploy

on:
  push:
    branches: ["main"]   # 🔒 ONLY main
  workflow_dispatch:    # 🔒 ONLY main

permissions:
  contents: write 
  pages: write 
  id-token: write

jobs:
  # This job waits for CI to pass first
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [ci]  # This makes sure the deploy job only runs if the CI job passed

    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper git info

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy
        run: npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
